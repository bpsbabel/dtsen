<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Groundcheck DTSEN BPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F62FE;
            --bg-color: #F4F7F9;
            --surface: #FFFFFF;
            --text-main: #1A1A1A;
            --text-muted: #5E6A75;
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: linear-gradient(135deg, #F4F7F9 0%, #E9F0F6 100%); 
            color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column;
        }
        header { padding: 40px 5%; text-align: center; }
        header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        header p { color: var(--text-muted); font-weight: 500; }

        .hero-container {
            max-width: 900px; margin: auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;
            width: 100%;
        }
        .portal-card {
            background: var(--surface); padding: 40px 30px; border-radius: var(--radius);
            text-decoration: none; text-align: center; transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(15, 98, 254, 0.1);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .portal-card:hover {
            transform: translateY(-10px); border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(15, 98, 254, 0.1);
        }
        .icon-box {
            width: 80px; height: 80px; background: #F0F4FF; color: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin-bottom: 10px;
        }
        .portal-card h2 { font-size: 1.5rem; color: var(--text-main); }
        .portal-card p { color: var(--text-muted); font-size: 0.95rem; }
        
        footer { padding: 30px; text-align: center; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <h1>Portal Groundcheck DTSEN</h1>
        <p>Badan Pusat Statistik Provinsi Kepulauan Bangka Belitung</p>
    </header>

    <div class="hero-container">
        <a href="pbi.html" class="portal-card">
            <div class="icon-box">📋</div>
            <h2>Groundcheck PBI</h2>
            <p>Monitoring progres dan kendala lapangan kegiatan PBI.</p>
        </a>

        <a href="pln.html" class="portal-card">
            <div class="icon-box">⚡</div>
            <h2>Groundcheck PLN</h2>
            <p>Monitoring progres dan kendala lapangan kegiatan PLN.</p>
        </a>
    </div>

    <footer>
        &copy; 2026 Tim Humas dan Protokol - BPS Prov. Kepulauan Bangka Belitung
    </footer>
</body>
</html>
